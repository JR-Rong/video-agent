series: history-world-001
category: history

overview: |
  本系列为史实叙述的历史小故事短视频合集。要求：
  1) 以史实为骨架，不编造关键史实；允许合理补全但弱化断言。
  2) 画面与用词符合地域与时期，不出现现代物件与现代语汇。
  3) 画面切换少，只在关键节点切换镜头；开头5-10秒必须强吸引。

rules:
  # 允许中文：系统会自动把这些转为英文检索关键词，用于素材平台搜索
  region: "中国"
  period: "战国-秦国"
  era: "战国-秦国"          # 用于画面提示词/时代约束（中文即可）
  genre: "realism"          # realism/fantasy/sci_fi（history默认realism）
  history_mode: "factual"   # 默认史实叙述；可选 classical_translation
  # 如果你未来要古文翻译：
  # classical_text: |
  #   ...

  # 外搜素材复用控制：同一集内相同素材至少间隔2个scene才可重复
  reuse_cooldown_scenes: 2

episodes:
  - prompt: "商鞅入秦：他第一眼看到的制度问题是什么？"
    total_seconds: 180
    media_mode: mixed

  - prompt: "为什么秦孝公敢用商鞅？他赌的是什么？"
    total_seconds: 180
    media_mode: images